<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corva Automatic CSV Formatter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --accent-cyan: #00bcd4;
            --accent-cyan-hover: #00acc1;
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --text-primary: #e0e0e0;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(0, 188, 212, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 540px;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-mark svg {
            width: 16px;
            height: 16px;
            fill: var(--bg-primary);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        h1 span {
            color: var(--accent-cyan);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-accent);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 44px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: var(--bg-primary);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-cyan);
            background: rgba(0, 188, 212, 0.04);
        }

        .drop-zone.has-file {
            border-color: var(--accent-green);
            background: rgba(76, 175, 80, 0.04);
        }

        .drop-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .drop-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .drop-text strong {
            color: var(--accent-cyan);
        }

        .file-name {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--accent-green);
            font-weight: 500;
            word-break: break-all;
        }

        .provider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .provider-row label {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .provider-row select {
            flex: 1;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .provider-row select:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .detected-badge {
            font-size: 0.78rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-cyan-hover);
            box-shadow: 0 0 16px rgba(0, 188, 212, 0.3);
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: var(--accent-green);
        }

        .status.error {
            display: block;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: var(--accent-red);
        }

        .status.loading {
            display: block;
            background: rgba(0, 188, 212, 0.08);
            border: 1px solid var(--border-accent);
            color: var(--accent-cyan);
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--accent-cyan);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1>Corva <span>Automatic CSV Formatter</span></h1>
        </div>
        <p class="subtitle">Upload a raw EDR CSV file to clean and format for Corva stream ingestion.</p>

        <div class="card">
            <div class="drop-zone" id="dropZone">
                <div class="drop-icon">&#128196;</div>
                <div class="drop-text">Drag & drop a CSV file here, or <strong>click to browse</strong></div>
                <div class="file-name" id="fileName"></div>
            </div>

            <input type="file" id="fileInput" accept=".csv" hidden>

            <div class="provider-row">
                <label>Provider:</label>
                <select id="providerSelect" disabled>
                    <option value="Auto-detect">Auto-detect</option>
                    <option value="NOV">NOV</option>
                    <option value="Rigcloud">Rigcloud</option>
                    <option value="Pason">Pason</option>
                </select>
                <span class="detected-badge" id="detectedBadge"></span>
            </div>
        </div>

        <button class="btn btn-primary" id="cleanBtn" disabled>Clean & Download</button>

        <div class="status" id="status"></div>

        <div class="footer">Corva Automatic CSV Formatter</div>
    </div>

    <script>
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");
        const fileName = document.getElementById("fileName");
        const providerSelect = document.getElementById("providerSelect");
        const detectedBadge = document.getElementById("detectedBadge");
        const cleanBtn = document.getElementById("cleanBtn");
        const status = document.getElementById("status");

        let selectedFile = null;

        // Drag and drop
        dropZone.addEventListener("click", () => fileInput.click());

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener("change", () => {
            if (fileInput.files.length) {
                handleFile(fileInput.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith(".csv")) {
                showStatus("Please select a .csv file.", "error");
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            dropZone.classList.add("has-file");
            cleanBtn.disabled = false;
            status.style.display = "none";

            // Auto-detect provider
            const formData = new FormData();
            formData.append("file", file);

            fetch("/detect", { method: "POST", body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.provider && data.provider !== "Unknown") {
                        providerSelect.value = data.provider;
                        providerSelect.disabled = false;
                        detectedBadge.textContent = `(auto-detected: ${data.provider})`;
                    } else {
                        providerSelect.value = "Auto-detect";
                        providerSelect.disabled = false;
                        detectedBadge.textContent = "(could not auto-detect)";
                    }
                })
                .catch(() => {
                    providerSelect.disabled = false;
                    detectedBadge.textContent = "";
                });
        }

        // Clean and download
        cleanBtn.addEventListener("click", async () => {
            if (!selectedFile) return;

            cleanBtn.disabled = true;
            showStatus('<span class="spinner"></span> Cleaning...', "loading");

            const formData = new FormData();
            formData.append("file", selectedFile);
            formData.append("provider", providerSelect.value);

            try {
                const response = await fetch("/clean", { method: "POST", body: formData });

                if (!response.ok) {
                    const err = await response.json();
                    showStatus(err.error || "Something went wrong.", "error");
                    cleanBtn.disabled = false;
                    return;
                }

                const blob = await response.blob();
                const disposition = response.headers.get("Content-Disposition") || "";
                const match = disposition.match(/filename="?(.+?)"?$/);
                const base = selectedFile.name.replace(/\.csv$/i, "");
                const downloadName = match ? match[1] : `${base}_Corva_Formatted.csv`;

                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = downloadName;
                a.click();
                URL.revokeObjectURL(url);

                const isZip = downloadName.endsWith(".zip");
                const note = isZip ? " (split into multiple parts)" : "";
                showStatus(`Done! File downloaded as <strong>${downloadName}</strong>${note}`, "success");
            } catch (e) {
                showStatus("Network error. Is the server running?", "error");
            }

            cleanBtn.disabled = false;
        });

        function showStatus(msg, type) {
            status.innerHTML = msg;
            status.className = "status " + type;
        }
    </script>
</body>
</html>
